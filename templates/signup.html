{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Create Account</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button class="btn primary" type="submit">Sign Up</button>
    </form>
</div>
{% endblock %}
