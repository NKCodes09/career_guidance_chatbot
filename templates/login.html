{% extends "base.html" %}
{% block content %}

<section class="page">
  <!-- Decorative background -->
  <div class="page-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="shell">
    <div class="card">
      <div class="card-pad">
        <h2 class="card-title">Log In</h2>
        <p class="card-subtitle">Welcome back. Continue your career journey.</p>

        <!-- novalidate disables browser's default validation so our JS handles it -->
        <form method="POST" class="form" id="login-form" novalidate>

          <div class="field-wrap">
            <input class="input" type="email" name="email" id="email"
                   placeholder="Email address" autocomplete="email">
            <span class="field-error" id="email-error"></span>
          </div>

          <div class="field-wrap">
            <input class="input" type="password" name="password" id="password"
                   placeholder="Password" autocomplete="current-password">
            <span class="field-error" id="password-error"></span>
          </div>

          <button class="btn primary block" type="submit">Log In</button>
        </form>

        <div class="helper-row">
          <a class="small-link" href="/signup">Don't have an account? Sign up</a>
          <a class="small-link" href="/">Back to home</a>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  const form     = document.getElementById('login-form');
  const email    = document.getElementById('email');
  const password = document.getElementById('password');

  // Shows or clears an error message under a field, and toggles the red border
  function showError(fieldId, msg) {
    const errorSpan = document.getElementById(fieldId + '-error');
    const input     = document.getElementById(fieldId);
    errorSpan.textContent  = msg;
    errorSpan.style.display = msg ? 'block' : 'none';
    input.classList.toggle('input-error', !!msg);
  }

  function validateEmail() {
    const val = email.value.trim();
    if (!val) { showError('email', 'Email is required.'); return false; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { showError('email', 'Please enter a valid email address.'); return false; }
    showError('email', '');
    return true;
  }

  function validatePassword() {
    if (!password.value) { showError('password', 'Password is required.'); return false; }
    showError('password', '');
    return true;
  }

  // Validate each field when user leaves it (on blur)
  email.addEventListener('blur', validateEmail);
  password.addEventListener('blur', validatePassword);

  // Clear the error as soon as the user starts correcting the field
  email.addEventListener('input',    () => { if (email.classList.contains('input-error'))    validateEmail(); });
  password.addEventListener('input', () => { if (password.classList.contains('input-error')) validatePassword(); });

  // On submit: use bitwise & (not &&) so BOTH fields are validated even if the first fails
  form.addEventListener('submit', e => {
    const ok = validateEmail() & validatePassword();
    if (!ok) e.preventDefault();
  });
</script>

{% endblock %}
